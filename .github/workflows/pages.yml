name: Deploy to GitHub Pages

# Trigger on pushes to the main branch
on:
  push:
    branches:
      - main
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Grant permissions to deploy to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository
      - name: Checkout
        uses: actions/checkout@v4

      # Step 2: Configure GitHub Pages
      - name: Setup Pages
        uses: actions/configure-pages@v5

      # Step 3: Assemble a clean site directory with only static assets
      - name: Build site directory
        run: |
          mkdir -p _site
          cp *.html _site/
          cp *.css _site/
          # Copy JS files except test files
          for f in *.js; do
            case "$f" in
              *.test.js) ;;
              *) cp "$f" _site/ ;;
            esac
          done

      # Step 4: Upload the clean site directory as the Pages artifact
      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      # Step 5: Deploy the artifact to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
